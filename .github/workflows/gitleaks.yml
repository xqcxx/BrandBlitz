name: Gitleaks

on:
  pull_request:
  schedule:
    - cron: "0 3 * * 0" # weekly (Sun) 03:00 UTC

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: zricethezav/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml

