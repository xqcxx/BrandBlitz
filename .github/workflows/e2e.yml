name: E2E Tests

# Issue #77: Run Playwright suite against docker-compose on every PR
# Ensures full-stack regressions fail the PR before merge

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env file
        run: |
          cp .env.example .env
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/brandblitz" >> .env
          echo "SESSION_SECRET=test-secret-for-ci-only" >> .env
          echo "GOOGLE_CLIENT_ID=test-client-id" >> .env
          echo "GOOGLE_CLIENT_SECRET=test-client-secret" >> .env

      - name: Start services with docker-compose
        run: |
          docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
          echo "Waiting for services to be healthy..."
          timeout 120 bash -c 'until docker compose ps | grep -q "healthy"; do sleep 2; done' || true
          sleep 10  # Additional buffer for service initialization

      - name: Check service health
        run: |
          docker compose ps
          docker compose logs api | tail -50
          curl -f http://localhost:3000/health || echo "API health check failed"

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm e2e
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: e2e/artifacts/
          retention-days: 7

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/artifacts/html-report/
          retention-days: 7

      - name: Upload traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: e2e/artifacts/test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.override.yml down -v
          docker compose -f docker-compose.yml -f docker-compose.override.yml rm -f

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== API Logs ==="
          docker compose logs api
          echo "=== Database Logs ==="
          docker compose logs db
          echo "=== Web Logs ==="
          docker compose logs web || echo "Web service not available"
